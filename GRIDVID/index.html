<style>
:root{
  --bg:#0a0a0a; --bg2:#0e0c0c; --panel:#111111; --panel2:#181818;
  --line:#262626; --line2:#3a3a3a;
  --ink:#eeeeee; --dim:#8f8f8f; --faint:#555555;
  --magenta:#ff5fae; --magenta-d:#e53aa3; --blue:#1e93ff; --cyan:#4fe3f0;
  --green:#4eea3a; --yellow:#ffd236; --bad:#fb2c36; --ok:#4eea3a;
  --halo:0 0 18px rgba(255,95,174,.55);
  --mono:"Space Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --pixel:"Silkscreen","Space Mono",monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 var(--mono);overflow:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:var(--ink)}
button{cursor:pointer;border:1px solid var(--line);background:var(--panel2);border-radius:3px;padding:6px 11px;transition:.1s;letter-spacing:.3px}
button:hover{border-color:var(--line2);background:#1f1f1f}
button:active{transform:translateY(1px)}
.tag{color:var(--dim)}
.micro{font:9px var(--pixel);text-transform:uppercase;letter-spacing:1px;color:var(--faint)}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#262626}::-webkit-scrollbar-track{background:transparent}

/* ---- app grid ---- */
#app{display:grid;grid-template-columns:56px 1fr 312px;grid-template-rows:50px 1fr;height:100vh;
  grid-template-areas:"top top top" "rail stage inspect"}

/* ---- top bar ---- */
#top{grid-area:top;display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:1px solid var(--line);background:var(--bg2)}
.brand{display:flex;align-items:center;gap:10px;font:14px var(--pixel);color:var(--ink);letter-spacing:.5px}
.brand .cur{color:var(--magenta);animation:blink 1.4s step-end infinite;margin-left:-4px}
.logo{width:18px;height:18px;border-radius:1px;image-rendering:pixelated;
  background:conic-gradient(var(--magenta) 0 25%, var(--cyan) 0 50%, var(--yellow) 0 75%, var(--green) 0 100%);
  box-shadow:var(--halo)}
.brand small{color:var(--faint);font:8px var(--pixel)}
#pname{background:transparent;border:1px solid transparent;border-radius:2px;padding:5px 8px;width:180px;color:var(--ink);font:12px var(--mono)}
#pname:hover{border-color:var(--line)} #pname:focus{outline:none;border-color:var(--magenta)}
.spacer{flex:1}
.run{background:var(--magenta);color:#0a0a0a;border:none;font:11px var(--pixel);padding:9px 15px;border-radius:2px;box-shadow:var(--halo);letter-spacing:.5px}
.run:hover{background:#ff7bbd;box-shadow:0 0 26px rgba(255,95,174,.7)}
.runlen{display:flex;align-items:center;gap:6px;font:8px var(--pixel);color:var(--faint);letter-spacing:.5px;border:1px solid var(--line);border-radius:2px;padding:3px 6px}
.runlen input{width:46px;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:4px 5px;color:var(--ink);font:11px var(--mono)}
.runlen input:focus{outline:none;border-color:var(--magenta)}
.menu{position:relative}
.menu-pop{position:absolute;right:0;top:40px;background:var(--panel);border:1px solid var(--line2);border-radius:3px;
  padding:5px;min-width:204px;display:none;z-index:30;box-shadow:0 18px 50px rgba(0,0,0,.7)}
.menu-pop.open{display:block}
.menu-pop button{display:flex;width:100%;justify-content:space-between;background:transparent;border:none;text-align:left;padding:8px 10px;border-radius:2px}
.menu-pop button:hover{background:#1f1f1f;color:var(--magenta)}
.menu-pop hr{border:none;border-top:1px solid var(--line);margin:5px 2px}
.menu-pop .k{color:var(--faint);font:9px var(--mono)}

/* ---- tool rail ---- */
#rail{grid-area:rail;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 0;
  border-right:1px solid var(--line);background:var(--bg2)}
.tool{width:38px;height:38px;display:grid;place-items:center;border-radius:3px;background:transparent;border:1px solid transparent;color:var(--dim);position:relative}
.tool:hover{background:var(--panel2);color:var(--ink);border-color:var(--line)}
.tool.on{color:#0a0a0a;background:var(--magenta);box-shadow:var(--halo);border-color:transparent}
.tool svg{width:19px;height:19px}
.tool .tip{position:absolute;left:46px;top:50%;transform:translateY(-50%);background:#000;border:1px solid var(--line2);
  color:var(--ink);padding:4px 8px;border-radius:2px;font:10px var(--mono);white-space:nowrap;opacity:0;pointer-events:none;transition:.12s;z-index:20}
.tool:hover .tip{opacity:1}
.rail-sep{width:22px;height:1px;background:var(--line);margin:4px 0}

/* ---- stage ---- */
#stage{grid-area:stage;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0a;overflow:hidden}
#stage::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(60% 50% at 50% 42%, rgba(255,95,174,.16), rgba(79,227,240,.06) 45%, transparent 72%);animation:flicker 7s infinite}
#stage::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px)}
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:3;font:9px var(--pixel);color:var(--faint);
  background:rgba(10,10,10,.8);padding:5px 10px;border-radius:2px;border:1px solid var(--line);letter-spacing:.5px}
#frameWrap{position:relative;z-index:2;border-radius:3px;padding:8px;background:rgba(0,0,0,.55);border:1px solid rgba(255,95,174,.28);
  box-shadow:0 0 60px rgba(255,95,174,.14), 0 0 120px rgba(79,227,240,.05)}
#cv{image-rendering:pixelated;border-radius:0;display:block;max-width:min(60vw,700px);max-height:60vh;height:auto;touch-action:none}
.transport{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:6px 9px;z-index:3}
.transport button{min-width:34px;padding:6px 8px;background:transparent;border:none;font-size:13px;color:var(--ink);border-radius:2px}
.transport button:hover{background:var(--panel2);color:var(--magenta)}
.transport .play{background:var(--magenta);color:#0a0a0a;min-width:40px;box-shadow:var(--halo)}
.transport .play:hover{background:#ff7bbd;color:#0a0a0a}
#timeline{width:min(50vw,540px);accent-color:var(--magenta)}
.tl-wrap{display:flex;align-items:center;gap:12px;z-index:3}
#counter{font:11px var(--pixel);color:var(--magenta);min-width:96px;letter-spacing:.5px}
.fps{display:flex;align-items:center;gap:6px;color:var(--faint);font:9px var(--pixel)}
.fps input{width:48px;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:4px 6px;color:var(--ink);font:11px var(--mono)}

/* ---- inspector ---- */
#inspect{grid-area:inspect;border-left:1px solid var(--line);background:var(--bg2);overflow-y:auto;padding:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:12px;margin-bottom:11px}
.card h3{margin:0 0 11px;font:10px var(--pixel);text-transform:uppercase;letter-spacing:.5px;color:var(--ink);display:flex;align-items:center;gap:8px}
.card h3 .pill{margin-left:auto;font:9px var(--mono);color:var(--magenta)}
.field{display:flex;flex-direction:column;gap:5px;margin:9px 0}
.field>label{font:8px var(--pixel);text-transform:uppercase;letter-spacing:.5px;color:var(--faint)}
.field input,.field select{background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:7px 9px;color:var(--ink);font:12px var(--mono)}
.field input:focus,.field select:focus{outline:none;border-color:var(--magenta)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:5px}
.sw{height:24px;border-radius:1px;border:2px solid transparent;cursor:pointer;transition:.08s;image-rendering:pixelated}
.sw:hover{transform:scale(1.08)} .sw.on{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.4)}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:2px;gap:2px}
.seg button{flex:1;border:none;background:transparent;padding:6px;border-radius:1px;font:10px var(--mono);color:var(--dim)}
.seg button.on{background:var(--magenta);color:#0a0a0a}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row button{flex:1}
.note{color:var(--faint);font:10px var(--mono);line-height:1.6;margin-top:8px}
.danger{color:var(--bad)} .danger:hover{border-color:var(--bad);color:var(--bad)}
.chk{display:flex;align-items:center;gap:8px;font:11px var(--mono);color:var(--dim);margin:8px 0}
.chk input{width:auto;accent-color:var(--magenta)}

/* ---- script drawer ---- */
#drawerBtn{position:fixed;right:328px;bottom:14px;z-index:25;background:var(--panel);border:1px solid var(--line2);
  border-radius:2px;padding:8px 12px;font:10px var(--pixel);display:flex;gap:7px;align-items:center;letter-spacing:.5px}
#drawerBtn:hover{color:var(--magenta);box-shadow:var(--halo)}
#drawer{position:fixed;left:56px;right:312px;bottom:0;height:0;overflow:hidden;background:var(--bg2);
  border-top:1px solid var(--magenta);transition:height .2s ease;z-index:24;box-shadow:0 -10px 40px rgba(0,0,0,.6), 0 -1px 20px rgba(255,95,174,.18)}
#drawer.open{height:300px}
.drawer-in{padding:12px 16px;height:100%;display:flex;flex-direction:column;gap:8px}
.drawer-head{display:flex;align-items:center;gap:10px}
#script{flex:1;width:100%;resize:none;background:#000;color:#8fffa8;border:1px solid var(--line);border-radius:2px;
  padding:11px;font:12.5px/1.6 var(--mono);tab-size:2;caret-color:var(--magenta)}
#script:focus{outline:none;border-color:var(--magenta)}
#err{color:var(--bad);font:11px var(--mono);white-space:pre-wrap;min-height:14px}
select.ex{background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:6px 9px;color:var(--ink);font:11px var(--mono)}
a.dl{display:none}

@keyframes blink{0%,70%{opacity:1}71%,100%{opacity:0}}
@keyframes flicker{0%,100%{opacity:1}47%{opacity:.82}49%{opacity:1}52%{opacity:.9}54%{opacity:1}}

@media(max-width:1080px){
  #app{grid-template-columns:56px 1fr;grid-template-areas:"top top" "rail stage";}
  #inspect{display:none} #drawer{right:0} #drawerBtn{right:14px}
}
</style>
</head>
<body>
<div id="app">
  <!-- TOP -->
  <div id="top">
    <div class="brand"><span class="logo"></span>gridvid<span class="cur">_</span></div>
    <input id="pname" value="untitled" spellcheck="false">
    <div class="spacer"></div>
    <button id="undoBtn" title="undo (⌘Z)">↶</button>
    <button id="redoBtn" title="redo (⇧⌘Z)">↷</button>
    <button id="clearBtn" title="clear the scene">CLEAR</button>
    <label class="runlen" title="how many frames to simulate (writes 'run N' in the script)">FRAMES <input id="runN" type="number" min="1" max="600" value="20"></label>
    <button class="run" id="run">RUN ▸</button>
    <div class="menu">
      <button id="exBtn">EXPORT ▾</button>
      <div class="menu-pop" id="exMenu">
        <button data-x="json">2dgridvid JSON<span class="k">.json</span></button>
        <button data-x="gif">animated GIF<span class="k">.gif</span></button>
        <button data-x="png">current frame PNG<span class="k">.png</span></button>
        <button data-x="strip">filmstrip PNG<span class="k">.png</span></button>
        <hr>
        <button data-x="augment">augmented batch ×<span class="k" id="augN">8</span></button>
        <button data-x="copy">copy JSON<span class="k">clip</span></button>
      </div>
    </div>
    <button id="saveBtn">SAVE</button>
    <button id="loadBtn">LOAD</button>
  </div>

  <!-- RAIL -->
  <div id="rail"></div>

  <!-- STAGE -->
  <div id="stage">
    <div id="hint"></div>
    <div id="frameWrap"><canvas id="cv" width="480" height="480"></canvas></div>
    <div class="transport">
      <button id="reset" title="first frame">⏮</button>
      <button id="back" title="step back">◀</button>
      <button class="play" id="play" title="play/pause">▶</button>
      <button id="fwd" title="step forward">▶|</button>
      <span class="fps">fps <input id="fps" type="number" value="6" min="1" max="30"></span>
      <button id="zoomOut" title="external zoom out — downscale the video (÷2)">⊖</button>
      <button id="zoomIn" title="external zoom in — duplicate every pixel (×2)">⊕</button>
    </div>
    <div class="tl-wrap">
      <input id="timeline" type="range" min="0" max="0" value="0">
      <span id="counter">0 / 0</span>
    </div>
  </div>

  <!-- INSPECTOR -->
  <div id="inspect"></div>
</div>

<button id="drawerBtn">&lt;/&gt; Script</button>
<div id="drawer">
  <div class="drawer-in">
    <div class="drawer-head">
      <span class="micro">Scene script (source of truth)</span>
      <select class="ex" id="examples"></select>
      <div class="spacer"></div>
      <button id="dslHelp" title="print DSL grammar">grammar</button>
      <button id="runScript" class="run" style="padding:6px 12px">▶ Run</button>
    </div>
    <textarea id="script" spellcheck="false"></textarea>
    <div id="err"></div>
  </div>
</div>

<a id="dl" class="dl"></a>
<!-- gridvid:inline engine.js --><script>
/* =============================================================================
 * gridvid engine — core logic for 2dgridvid (small ARC-palette grid videos)
 *
 * A 2dgridvid is a list of 2D grids (frames), each cell an ARC color 0..9.
 * PURE LOGIC (no DOM). Runs in the browser (window.GRIDVID) and Node (require).
 *
 *   scene-DSL text  ->  World (objects + physics + fields)  ->  frames  -> JSON
 *
 * Mechanics: objects, gravity, collision, bounce, inside/outside, shape-sorter,
 *   voronoi fields (segmentation prior), shooters/beams, spinning objects,
 *   liquid sources (falling-sand/water). Plus ARC-style augmentation.
 * ========================================================================== */
(function (root, factory) {
  const api = factory();
  if (typeof module === "object" && module.exports) module.exports = api;
  root.GRIDVID = api;
})(typeof globalThis !== "undefined" ? globalThis : this, function () {
  "use strict";

  const VERSION = 2;

  const ARC_PALETTE = [
    "#000000", "#0074D9", "#FF4136", "#2ECC40", "#FFDC00",
    "#AAAAAA", "#F012BE", "#FF851B", "#7FDBFF", "#870C25",
  ];

  // ---- RNG: seedable mulberry32 (deterministic, reproducible batches) --------
  function makeRng(seed) {
    let s = (seed >>> 0) || 1;
    const rng = function () {
      s |= 0; s = (s + 0x6d2b79f5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    rng.int = (lo, hi) => lo + Math.floor(rng() * (hi - lo + 1));
    rng.pick = (arr) => arr[rng.int(0, arr.length - 1)];
    for (let i = 0; i < 6; i++) rng();   // warm-up: mulberry32's first draws correlate with the seed; consecutive seeds (1,2,3..) must decorrelate
    return rng;
  }

  // ---- Shapes: a shape is a normalized MASK (list of [dr,dc] offsets) --------
  function normalize(cells) {
    if (!cells.length) return [];
    let mr = Infinity, mc = Infinity;
    for (const [r, c] of cells) { if (r < mr) mr = r; if (c < mc) mc = c; }
    const out = cells.map(([r, c]) => [r - mr, c - mc]);
    out.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    return out;
  }
  function rectCells(h, w) { const o = []; for (let i = 0; i < h; i++) for (let j = 0; j < w; j++) o.push([i, j]); return o; }
  function dedupe(cells) { const s = new Set(), o = []; for (const [r, c] of cells) { const k = r + "," + c; if (!s.has(k)) { s.add(k); o.push([r, c]); } } return o; }

  const SHAPES = {
    dot: () => [[0, 0]],
    square: (s = 3) => rectCells(s, s),
    rect: (h = 2, w = 4) => rectCells(h, w),
    line: (len = 4, v = 0) => v ? rectCells(len, 1) : rectCells(1, len),
    plus: (s = 3) => { const m = (s - 1) >> 1, o = []; for (let i = 0; i < s; i++) { o.push([m, i]); o.push([i, m]); } return normalize(dedupe(o)); },
    Lshape: (s = 3) => { const o = []; for (let i = 0; i < s; i++) o.push([i, 0]); for (let j = 0; j < s; j++) o.push([s - 1, j]); return normalize(dedupe(o)); },
    Tshape: (s = 3) => { const m = (s - 1) >> 1, o = []; for (let j = 0; j < s; j++) o.push([0, j]); for (let i = 0; i < s; i++) o.push([i, m]); return normalize(dedupe(o)); },
    triangle: (s = 4) => { const o = []; for (let i = 0; i < s; i++) for (let j = 0; j <= i; j++) o.push([i, j]); return normalize(o); },
    diamond: (r = 2) => { const o = []; for (let i = -r; i <= r; i++) for (let j = -r; j <= r; j++) if (Math.abs(i) + Math.abs(j) <= r) o.push([i, j]); return normalize(o); },
    disc: (r = 2) => { const o = []; for (let i = -r; i <= r; i++) for (let j = -r; j <= r; j++) if (i * i + j * j <= r * r + r) o.push([i, j]); return normalize(o); },
    ring: (s = 5) => outline(rectCells(s, s)),
    frame: (h = 4, w = 6) => outline(rectCells(h, w)),
    // complementary "convex enters concave" pair: a bump (protrusion on the bottom) drops
    // into a notch (a slot cut into the top). Same s ⇒ they interlock exactly.
    notch: (s = 5) => { const m = (s - 1) >> 1, o = []; for (let i = 0; i < s; i++) for (let j = 0; j < s; j++) if (!(j === m && i < 2)) o.push([i, j]); return normalize(o); },
    bump: (s = 5) => { const m = (s - 1) >> 1, o = rectCells(s, s); o.push([s, m]); o.push([s + 1, m]); return normalize(o); },
    Ushape: (s = 5) => { const o = []; for (let i = 0; i < s; i++) { o.push([i, 0]); o.push([i, s - 1]); } for (let j = 0; j < s; j++) o.push([s - 1, j]); return normalize(dedupe(o)); },
    Cshape: (s = 5) => { const o = []; for (let j = 0; j < s; j++) { o.push([0, j]); o.push([s - 1, j]); } for (let i = 0; i < s; i++) o.push([i, 0]); return normalize(dedupe(o)); },
    Hshape: (s = 5) => { const m = (s - 1) >> 1, o = []; for (let i = 0; i < s; i++) { o.push([i, 0]); o.push([i, s - 1]); } for (let j = 0; j < s; j++) o.push([m, j]); return normalize(dedupe(o)); },
    Zshape: (s = 5) => { const o = []; for (let j = 0; j < s; j++) { o.push([0, j]); o.push([s - 1, j]); } for (let i = 1; i < s - 1; i++) o.push([i, s - 1 - i]); return normalize(dedupe(o)); },
    stair: (s = 5) => { const o = []; for (let i = 0; i < s; i++) { o.push([i, i]); if (i + 1 < s) o.push([i + 1, i]); } return normalize(dedupe(o)); },
    arrow: (s = 5) => { const m = (s - 1) >> 1, o = []; for (let i = 0; i < s; i++) o.push([i, m]); for (let k = 0; k <= m; k++) { o.push([k, m - k]); o.push([k, m + k]); } return normalize(dedupe(o)); },
    key: (s = 5) => { const o = outline(rectCells(Math.max(3, s - 1), Math.max(3, s - 1))); const m = (s - 1) >> 1; for (let j = s - 1; j < s + 3; j++) o.push([m, j]); o.push([m - 1, s + 1]); o.push([m + 1, s + 2]); return normalize(dedupe(o)); },
    fork: (s = 5) => { const m = (s - 1) >> 1, o = []; for (let i = 1; i < s; i++) o.push([i, m]); for (let j = 0; j < s; j += 2) { o.push([0, j]); o.push([1, j]); } return normalize(dedupe(o)); },
    bridge: (s = 5) => { const o = []; for (let j = 0; j < s; j++) o.push([0, j]); for (let i = 0; i < s; i++) { o.push([i, 0]); o.push([i, s - 1]); } return normalize(dedupe(o)); },
  };

  function outline(cells) {
    const set = new Set(cells.map(([r, c]) => r + "," + c));
    return normalize(cells.filter(([r, c]) =>
      !(set.has((r - 1) + "," + c) && set.has((r + 1) + "," + c) &&
        set.has(r + "," + (c - 1)) && set.has(r + "," + (c + 1)))));
  }
  function outerOutline(cells) {
    const set = new Set(cells.map(([r, c]) => r + "," + c)), seen = new Set(), out = [];
    for (const [r, c] of cells) for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const rr = r + dr, cc = c + dc, k = rr + "," + cc;
      if (!set.has(k) && !seen.has(k)) { seen.add(k); out.push([rr, cc]); }
    }
    out.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    return out;
  }
  function interiorOf(cells) {
    const set = new Set(cells.map(([r, c]) => r + "," + c));
    return cells.filter(([r, c]) =>
      set.has((r - 1) + "," + c) && set.has((r + 1) + "," + c) &&
      set.has(r + "," + (c - 1)) && set.has(r + "," + (c + 1)));
  }
  function shapeSig(cells) { return normalize(cells).map(([r, c]) => r + ":" + c).join("|"); }
  function bbox(cells) { let h = 0, w = 0; for (const [r, c] of cells) { if (r + 1 > h) h = r + 1; if (c + 1 > w) w = c + 1; } return [h, w]; }
  function buildShape(name, args) { const fn = SHAPES[name]; if (!fn) throw new Error("unknown shape: " + name); return normalize(fn.apply(null, args)); }
  // rotate a relative mask 90° clockwise.
  function rotateCells(cells) { const [h] = bbox(cells); return normalize(cells.map(([r, c]) => [c, h - 1 - r])); }
  // mirror a relative mask across its vertical / horizontal centre line.
  function flipCellsH(cells) { const [, w] = bbox(cells); return normalize(cells.map(([r, c]) => [r, w - 1 - c])); }
  function flipCellsV(cells) { const [h] = bbox(cells); return normalize(cells.map(([r, c]) => [h - 1 - r, c])); }
  // compose rot (×90° cw) then optional flip 'h'|'v' on a relative mask.
  function transformCells(cells, rot = 0, flip = null) {
    let o = cells; const k = ((rot % 4) + 4) % 4;
    for (let i = 0; i < k; i++) o = rotateCells(o);
    if (flip === "h") o = flipCellsH(o); else if (flip === "v") o = flipCellsV(o);
    return normalize(o);
  }

  // ---- Detector predicates (G3): cheap geometry/topology over ONE body's cells. ---
  // We can CONSTRUCT symmetry/convexity/holes; these let us TEST them, so a fixed
  // template rule becomes context-sensitive (dispatch/classify) — the #1 ARC-AGI-2 driver.
  function cellKeySet(cells) { const s = new Set(); for (const [r, c] of cells) s.add(r + "," + c); return s; }
  function isConnected(cells) {   // single 4-connected component?
    if (cells.length <= 1) return true;
    const s = cellKeySet(cells), seen = new Set(), st = [cells[0]]; seen.add(cells[0][0] + "," + cells[0][1]);
    while (st.length) { const [r, c] = st.pop();
      for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) { const k = (r + dr) + "," + (c + dc);
        if (s.has(k) && !seen.has(k)) { seen.add(k); st.push([r + dr, c + dc]); } } }
    return seen.size === s.size;
  }
  function holeCount(cells) {   // # of background regions fully enclosed by the body (4-connectivity, flood from outside)
    const [h, w] = bbox(cells); if (h < 3 || w < 3) return 0; const s = cellKeySet(cells);
    const H = h + 2, W = w + 2, occ = (r, c) => s.has((r - 1) + "," + (c - 1));   // pad 1 so exterior wraps around
    const seen = new Set(["0,0"]), st = [[0, 0]];
    while (st.length) { const [r, c] = st.pop();
      for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) { const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= H || nc >= W) continue; const k = nr + "," + nc;
        if (seen.has(k) || occ(nr, nc)) continue; seen.add(k); st.push([nr, nc]); } }
    let regions = 0; const visited = new Set();
    for (let r = 0; r < h; r++) for (let c = 0; c < w; c++) {
      if (s.has(r + "," + c) || seen.has((r + 1) + "," + (c + 1)) || visited.has(r + "," + c)) continue;
      regions++; const st2 = [[r, c]]; visited.add(r + "," + c);   // a new enclosed bg region
      while (st2.length) { const [rr, cc] = st2.pop();
        for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) { const a = rr + dr, b = cc + dc;
          if (a < 0 || b < 0 || a >= h || b >= w) continue; const kk = a + "," + b;
          if (s.has(kk) || seen.has((a + 1) + "," + (b + 1)) || visited.has(kk)) continue; visited.add(kk); st2.push([a, b]); } } }
    return regions;
  }
  function isConvex(cells) {   // hull==filled: every grid cell inside the convex hull of the shape is filled (rejects L/T/U/plus)
    if (cells.length <= 2) return true;
    const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
    const pts = cells.map(([r, c]) => [c, r]).sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    const lo = []; for (const p of pts) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], p) <= 0) lo.pop(); lo.push(p); }
    const hi = []; for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (hi.length >= 2 && cross(hi[hi.length - 2], hi[hi.length - 1], p) <= 0) hi.pop(); hi.push(p); }
    const hull = lo.slice(0, -1).concat(hi.slice(0, -1));
    if (hull.length < 3) return true;   // degenerate (collinear) → convex
    const s = cellKeySet(cells), [h, w] = bbox(cells);
    const inside = (x, y) => { let pos = false, neg = false;   // inside-or-on a convex polygon ⇔ same side of every edge
      for (let i = 0; i < hull.length; i++) { const cr = cross(hull[i], hull[(i + 1) % hull.length], [x, y]); if (cr > 0) pos = true; else if (cr < 0) neg = true; }
      return !(pos && neg); };
    for (let r = 0; r < h; r++) for (let c = 0; c < w; c++) if (inside(c, r) && !s.has(r + "," + c)) return false;
    return true;
  }
  function collinear(cells) { if (cells.length <= 2) return true; const [h, w] = bbox(cells); return h === 1 || w === 1; }
  function symmetryClass(cells) {   // strongest reflection/180°-rot symmetry the shape has
    const sig = shapeSig(cells);
    const hsym = shapeSig(flipCellsH(cells)) === sig, vsym = shapeSig(flipCellsV(cells)) === sig;
    const rot = shapeSig(rotateCells(rotateCells(cells))) === sig;
    if (hsym && vsym) return "hv"; if (hsym) return "h"; if (vsym) return "v"; if (rot) return "rot"; return "none";
  }
  // Each predicate maps a body → a value (boolean | number | category string), reused by
  // dispatch / classify / the `where` selector. Add detectors here as new concepts appear.
  const PREDICATES = {
    color: b => b.color,
    kind: b => b.kind,
    size: b => b.cells.length,
    size_class: b => b.cells.length <= 2 ? "small" : b.cells.length <= 6 ? "mid" : "big",
    orientation: b => { const [h, w] = bbox(b.cells); return w > h ? "wide" : h > w ? "tall" : "square"; },
    convex: b => isConvex(b.cells),
    symmetric: b => symmetryClass(b.cells) !== "none",
    symmetry: b => symmetryClass(b.cells),
    connected: b => isConnected(b.cells),
    collinear: b => collinear(b.cells),
    loop: b => holeCount(b.cells) > 0,
    holes: b => holeCount(b.cells),
    parity: b => (b.cells.length % 2 === 0) ? "even" : "odd",
  };
  function evalPred(name, b) {
    const f = PREDICATES[name];
    if (!f) throw new Error("unknown predicate: " + name + " (have: " + Object.keys(PREDICATES).join(" ") + ")");
    return f(b);
  }
  // truthy test for boolean-ish predicate values ('none'/'false'/0/'' are falsy classes)
  function predTruthy(v) { return !!v && v !== "none" && v !== "false" && v !== 0 && v !== "0"; }

  // ---- Body: a movable object ------------------------------------------------
  let _autoId = 0;
  function makeBody(o) {
    return {
      id: o.id || ("b" + (_autoId++)), cells: normalize(o.cells),
      r: o.r | 0, c: o.c | 0, color: o.color == null ? 1 : o.color,
      interior: o.interior == null ? null : o.interior,
      vr: o.vr | 0, vc: o.vc | 0, gravity: !!o.gravity,
      bounce: o.bounce == null ? 0 : o.bounce, fill: o.fill || "solid",
      kind: o.kind || "block", target: o.target || null, locked: false,
      spin: o.spin | 0, ghost: !!o.ghost, ttl: o.ttl == null ? -1 : o.ttl,
      layer: o.layer | 0, magnet: o.magnet | 0, link: o.link || null,
      sig: shapeSig(o.cells), srcLine: o.srcLine == null ? -1 : o.srcLine,
      r0: o.r | 0, c0: o.c | 0,
    };
  }
  function absCells(b, r = b.r, c = b.c) { return b.cells.map(([dr, dc]) => [r + dr, c + dc]); }
  function offGrid(world, b) { return absCells(b).every(([r, c]) => r < 0 || r >= world.h || c < 0 || c >= world.w); }

  // ---- World -----------------------------------------------------------------
  function makeWorld(o = {}) {
    return {
      w: o.w || 16, h: o.h || 16, bg: o.bg == null ? 0 : o.bg,

/* =============================================================================
 * gif.js — minimal animated GIF89a encoder for indexed grid videos.
 *
 * Purpose-built for 2dgridvid: frames are int grids of palette indices (0..N-1,
 * N<=256), so we skip quantization entirely and write the palette as the GIF
 * Global Color Table. Each cell is scaled to a `cell`xcell pixel block.
 *
 * UMD: window.GIFENC in the browser, require('./gif.js') in Node.
 * Returns a Uint8Array of GIF bytes.  encodeGif({frames, palette, cell, delay}).
 * ========================================================================== */
(function (root, factory) {
  const api = factory();
  if (typeof module === "object" && module.exports) module.exports = api;
  root.GIFENC = api;
})(typeof globalThis !== "undefined" ? globalThis : this, function () {
  "use strict";

  function hexToRgb(h) {
    h = h.replace("#", "");
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }

  // variable-width LZW compression as specified by the GIF spec.
  function lzwEncode(indices, minCodeSize) {
    const clear = 1 << minCodeSize;
    const eoi = clear + 1;
    let codeSize = minCodeSize + 1;
    let next = eoi + 1;
    let dict = new Map();
    const resetDict = () => {
      dict = new Map();
      for (let i = 0; i < clear; i++) dict.set(String(i), i);
      next = eoi + 1; codeSize = minCodeSize + 1;
    };

    const out = [];
    let cur = 0, curBits = 0;
    const emit = (code) => {
      cur |= code << curBits; curBits += codeSize;
      while (curBits >= 8) { out.push(cur & 0xff); cur >>= 8; curBits -= 8; }
    };

    resetDict();
    emit(clear);
    let prefix = String(indices[0]);
    for (let i = 1; i < indices.length; i++) {
      const k = indices[i];
      const combined = prefix + "," + k;
      if (dict.has(combined)) {
        prefix = combined;
      } else {
        emit(dict.get(prefix));
        dict.set(combined, next++);
        if (next > (1 << codeSize) && codeSize < 12) codeSize++;
        if (next > 4095) { emit(clear); resetDict(); }
        prefix = String(k);
      }
    }
    emit(dict.get(prefix));
    emit(eoi);
    if (curBits > 0) out.push(cur & 0xff);
    return out;
  }

  function encodeGif(opts) {
    const { frames, palette } = opts;
    const cell = opts.cell || 12;
    const delay = Math.max(2, Math.round((opts.delayMs || 140) / 10)); // GIF delay = 1/100s
    const H = frames[0].length, W = frames[0][0].length;
    const pw = W * cell, ph = H * cell;

    // color table size must be a power of two >= palette length, min 2.
    let tableSize = 2, gctBits = 1;
    while (tableSize < palette.length) { tableSize <<= 1; gctBits++; }
    const minCodeSize = Math.max(2, gctBits);

    const bytes = [];
    const u8 = (b) => bytes.push(b & 0xff);
    const u16 = (v) => { bytes.push(v & 0xff); bytes.push((v >> 8) & 0xff); };
    const str = (s) => { for (let i = 0; i < s.length; i++) bytes.push(s.charCodeAt(i)); };

    str("GIF89a");
    u16(pw); u16(ph);
    u8(0xf0 | (gctBits - 1)); // GCT present, color res, GCT size
    u8(0); u8(0);            // bg color index, aspect ratio

    // Global Color Table
    for (let i = 0; i < tableSize; i++) {
      const [r, g, b] = i < palette.length ? hexToRgb(palette[i]) : [0, 0, 0];
      u8(r); u8(g); u8(b);
    }

    // NETSCAPE looping extension
    u8(0x21); u8(0xff); u8(0x0b); str("NETSCAPE2.0");
    u8(0x03); u8(0x01); u16(0); u8(0); // loop forever

    for (const frame of frames) {
      // Graphic Control Extension (per-frame delay)
      u8(0x21); u8(0xf9); u8(0x04); u8(0x00); u16(delay); u8(0x00); u8(0x00);

      // Image Descriptor
      u8(0x2c); u16(0); u16(0); u16(pw); u16(ph); u8(0x00);

      // upscale grid -> pixel indices (row-major)
      const px = new Array(pw * ph);
      for (let y = 0; y < ph; y++) {
        const gy = (y / cell) | 0;
        for (let x = 0; x < pw; x++) px[y * pw + x] = frame[gy][(x / cell) | 0];
      }

      u8(minCodeSize);
      const data = lzwEncode(px, minCodeSize);
      for (let i = 0; i < data.length; i += 255) {
        const chunk = data.slice(i, i + 255);
        u8(chunk.length);
        for (const b of chunk) u8(b);
      }
      u8(0x00); // block terminator
    }

    u8(0x3b); // trailer
    return new Uint8Array(bytes);
  }

  return { encodeGif };
});

  shooter:'<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v5M12 17v5M2 12h5M17 12h5" stroke="currentColor" stroke-width="1.6"/>',
  source:'<path d="M12 3c4 5 6 8 6 11a6 6 0 11-12 0c0-3 2-6 6-11z" fill="none" stroke="currentColor" stroke-width="1.7"/>',
  voronoi:'<path d="M4 5h6l4 4-2 6-6 1-3-5z M14 4l6 3-1 6-4 2-3-7z" fill="none" stroke="currentColor" stroke-width="1.5"/>',
  noise:'<g fill="currentColor"><rect x="3" y="4" width="3" height="3"/><rect x="10" y="3" width="3" height="3"/><rect x="16" y="6" width="3" height="3"/><rect x="6" y="10" width="3" height="3"/><rect x="13" y="12" width="3" height="3"/><rect x="3" y="16" width="3" height="3"/><rect x="17" y="15" width="3" height="3"/></g>',
  erase:'<path d="M6 18h12M8 16l-3-3a2 2 0 010-3l6-6a2 2 0 013 0l3 3a2 2 0 010 3l-6 6H8z" fill="none" stroke="currentColor" stroke-width="1.6"/>',
};
const TOOLS = [
  {id:"select",name:"Select / Move  (V)"},
  {id:"paint",name:"Paint cell  (B)"},
  {id:"stamp",name:"Stamp shape  (S)"},
  {id:"hole",name:"Hole  (H)"},
  {sep:true},
  {id:"shooter",name:"Shooter  (T)"},
  {id:"source",name:"Liquid source  (L)"},
  {id:"voronoi",name:"Voronoi  (O)"},
  {id:"noise",name:"Random / Perlin  (N)"},
  {sep:true},
  {id:"erase",name:"Erase object  (E)"},
];
let tool = "select";

/* ================= state ================= */
let vid=null, frameIdx=0, playing=false, timer=null;
let setup=null;              // {world, owners, grid} from noSim parse (for editing on frame 0)
let selected=null;          // {body, srcLine}
let drag=null;
let undoStack=[], redoStack=[], clip=null;   // history + clipboard (script is source of truth)
const opt = { color:2, shape:"square", args:"3", vel:"0 0", grav:0, bounce:0, spin:0, interior:"",
  fill:"solid", layer:0, magnet:0, dir:"right", every:4, beam:"bolt", speed:1, rate:1, viscosity:0.5, turbulence:0, flow:1,
  vcount:8, borders:"", drift:0, nmode:"uniform", ncolors:"0 1 2", nprobs:"0.5 0.25 0.25", nscale:6, augN:8 };

/* ================= build rail ================= */
const rail=$("rail");
TOOLS.forEach(t=>{
  if(t.sep){ const s=document.createElement("div"); s.className="rail-sep"; rail.appendChild(s); return; }
  const b=document.createElement("button"); b.className="tool"+(t.id===tool?" on":""); b.dataset.tool=t.id;
  b.innerHTML=`<svg viewBox="0 0 24 24">${ICON[t.id]}</svg><span class="tip">${t.name}</span>`;
  b.onclick=()=>setTool(t.id);
  rail.appendChild(b);
});
function setTool(id){ tool=id; selected=null;
  [...rail.children].forEach(c=>c.classList && c.classList.toggle("on", c.dataset && c.dataset.tool===id));
  frameIdx=0; setPlaying(false);   // every tool edits frame 0 — snap there so markers/objects are visible & clickable
  renderInspector(); draw(); updateHint();
}

/* ================= examples dropdown ================= */
for(const k of Object.keys(EXAMPLES)){ const o=document.createElement("option"); o.value=k; o.textContent=k; $("examples").appendChild(o); }
$("examples").onchange=e=>{ snapshot(); $("script").value=EXAMPLES[e.target.value]; $("pname").value=e.target.value.replace(/\s+/g,"-"); selected=null; rebuild(); renderInspector(); play(); };

/* ================= core: parse text -> setup + vid ================= */
function rebuild(){
  const text=$("script").value;
  try{
    const w=G.runScene(text,{noSim:true});
    const r=G.renderFrame(w,{owners:true});
    setup={world:w, owners:r.owners, grid:r.grid};
    const sim=G.runScene(text);
    vid=G.toGridVid(sim,{fps:+$("fps").value});
    $("err").textContent="";
  }catch(e){ $("err").textContent=String(e.message||e); return false; }
  $("timeline").max=vid.frames.length-1;
  if(frameIdx>vid.frames.length-1) frameIdx=0;
  const rm=text.match(/^\s*run\s+(\d+)/m); if(rm && $("runN")) $("runN").value=rm[1];   // mirror run-length into the top bar
  fitCanvas(); draw(); localStorage.setItem("gridvid:script",text);
  return true;
}
// set the simulation length: rewrite (or insert) the `run N` line in the script.
function setRun(n){ const L=setupLines(); const i=L.findIndex(l=>/^\s*run\b/.test(l));
  if(i>=0) L[i]="run "+n; else { let j=L.findIndex(l=>/^\s*hold\b/.test(l)); if(j<0)j=L.length; L.splice(j,0,"run "+n); }
  commit(L); }
function fitCanvas(){
  const cp=Math.max(4,Math.floor(720/Math.max(vid.width,vid.height)));
  $("cv").width=vid.width*cp; $("cv").height=vid.height*cp; $("cv")._cp=cp;
}
function curGrid(){ // edit tools operate on frame 0 (the setup); else show the video
  if(frameIdx===0 && setup) return setup.grid;
  return vid.frames[frameIdx];
}
function draw(){
  if(!vid) return;
  const cv=$("cv"), ctx=cv.getContext("2d"), cp=cv._cp, g=curGrid();
  for(let r=0;r<vid.height;r++)for(let c=0;c<vid.width;c++){ ctx.fillStyle=G.ARC_PALETTE[g[r][c]]||"#000"; ctx.fillRect(c*cp,r*cp,cp,cp); }
  if(cp>=9){ ctx.strokeStyle="rgba(255,255,255,.05)"; ctx.lineWidth=1;
    for(let c=0;c<=vid.width;c++){ctx.beginPath();ctx.moveTo(c*cp+.5,0);ctx.lineTo(c*cp+.5,cv.height);ctx.stroke();}
    for(let r=0;r<=vid.height;r++){ctx.beginPath();ctx.moveTo(0,r*cp+.5);ctx.lineTo(cv.width,r*cp+.5);ctx.stroke();}}
  // editor-only markers: sources & shooters shown as dotted glyphs on frame 0,
  // and gone the moment you Run (they never appear in the rendered video).
  if(frameIdx===0 && setup && !playing){
    const dot=(r,c,col,glyph,arrow)=>{ const x=c*cp,y=r*cp;
      ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=Math.max(1.5,cp*0.12); ctx.setLineDash([Math.max(2,cp*0.28),Math.max(2,cp*0.22)]);
      ctx.strokeRect(x+1.5,y+1.5,cp-3,cp-3); ctx.setLineDash([]);
      ctx.font="bold "+Math.floor(cp*0.6)+"px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(glyph,x+cp/2,y+cp/2+1);
      if(arrow){ ctx.beginPath(); const mx=x+cp/2,my=y+cp/2; ctx.moveTo(mx,my); ctx.lineTo(mx+arrow[1]*cp*0.7,my+arrow[0]*cp*0.7); ctx.lineWidth=Math.max(1.5,cp*0.14); ctx.stroke(); }
      ctx.restore(); };
    for(const s of setup.world.sources) dot(s.r,s.c,"#7FDBFF","L");
    for(const sh of setup.world.shooters) dot(sh.r,sh.c,"#ff5fae","T",sh.dir);
  }
  if(selected && selected.body && frameIdx===0){ const b=selected.body;
    let mnr=b.r,mnc=b.c,mxr=b.r,mxc=b.c;
    if(selected.kind==="body" && b.cells) for(const [dr,dc] of b.cells){ const rr=b.r+dr,cc=b.c+dc; mnr=Math.min(mnr,rr);mnc=Math.min(mnc,cc);mxr=Math.max(mxr,rr);mxc=Math.max(mxc,cc); }
    ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.setLineDash([5,4]);
    ctx.strokeRect(mnc*cp+1,mnr*cp+1,(mxc-mnc+1)*cp-2,(mxr-mnr+1)*cp-2); ctx.setLineDash([]);
  }
  $("counter").textContent=(frameIdx+1)+" / "+vid.frames.length;
  $("timeline").value=frameIdx;
}
function updateHint(){
  const h={select:"Select: click an object, source or shooter on frame 0; drag to move",paint:"Paint: click to drop a 1×1 cell",
    stamp:"Stamp: click to place the shape",hole:"Hole: click to place a sorter socket",
    shooter:"Shooter: click to place an emitter",source:"Source: click to place a liquid source",
    voronoi:"Voronoi: click to add a region field",noise:"Noise: set options, click to fill the grid",erase:"Erase: click an object to delete it"};
  $("hint").textContent=h[tool]||"";
}

/* ================= playback ================= */
function setPlaying(on){ playing=on; $("play").textContent=on?"⏸":"▶";
  if(timer){clearInterval(timer);timer=null;}
  if(on&&vid) timer=setInterval(()=>{ frameIdx=(frameIdx+1)%vid.frames.length; draw(); },1000/Math.max(1,+$("fps").value));
}
function play(){ frameIdx=0; setPlaying(true); }
$("play").onclick=()=>setPlaying(!playing);
$("fwd").onclick=()=>{ if(vid){frameIdx=Math.min(vid.frames.length-1,frameIdx+1);setPlaying(false);draw();} };
$("back").onclick=()=>{ if(vid){frameIdx=Math.max(0,frameIdx-1);setPlaying(false);draw();} };
$("reset").onclick=()=>{ frameIdx=0;setPlaying(false);draw(); };
$("timeline").oninput=e=>{ frameIdx=+e.target.value;setPlaying(false);draw(); };
// RUN compiles the script as-is (respecting a hand-typed `run N`); only if there's no
// run line does it use the FRAMES field. The FRAMES field always rewrites the run line.
function doRun(){ if(/^\s*run\b/m.test($("script").value)) rebuild(); else setRun(+$("runN").value||20); if(vid && !$("err").textContent) play(); }
$("run").onclick=doRun;
$("runScript").onclick=doRun;
$("runN").onchange=()=>{ setRun(+$("runN").value||20); if(vid && !$("err").textContent) play(); };
$("fps").onchange=()=>{ if(vid)vid.fps=+$("fps").value; };
// external zoom: transform the actual video resolution (zoom-in duplicates every pixel).
$("zoomIn").onclick=()=>{ if(!vid)return; vid=G.zoomVid(vid,2); fitCanvas(); draw(); flash("zoom in ×2 — pixels duplicated ("+vid.width+"×"+vid.height+")"); };
$("zoomOut").onclick=()=>{ if(!vid||vid.width<6||vid.height<6)return; vid=G.zoomVid(vid,-2); fitCanvas(); draw(); flash("zoom out ÷2 ("+vid.width+"×"+vid.height+")"); };

/* ================= history (undo/redo) — snapshot the script text ============ */
function snapshot(){ undoStack.push($("script").value); if(undoStack.length>150)undoStack.shift(); redoStack=[]; }
function setScript(txt,reselect){ $("script").value=txt; rebuild(); if(!reselect){selected=null;} renderInspector(); }
function undo(){ if(!undoStack.length)return; redoStack.push($("script").value); setScript(undoStack.pop()); }
function redo(){ if(!redoStack.length)return; undoStack.push($("script").value); setScript(redoStack.pop()); }
function clearScene(){ snapshot(); const w=setup?setup.world.w:24,h=setup?setup.world.h:22;
  $("script").value=`name untitled\ngrid ${w} ${h}\nbg 0\n`; frameIdx=0; rebuild(); selected=null; renderInspector(); }

/* ================= DSL line helpers (visual edits write DSL) ================= */
function setupLines(){ return $("script").value.split("\n"); }
function commit(lines){ snapshot(); $("script").value=lines.join("\n"); rebuild(); }
function insertSetup(line){ const L=setupLines(); let i=L.findIndex(l=>/^\s*(run|hold)\b/.test(l)); if(i<0)i=L.length; L.splice(i,0,line); commit(L); }
// add/replace/REMOVE a key in one DSL line. val===null removes it. word args supported.
function setProp(line,key,val){
  const word = key==="fill"||key==="target"||key==="id"||key==="dir"||key==="beam";
  const n = (key==="at"||key==="vel") ? 2 : 1;
  const argpat = word ? "\\s+\\S+" : "(\\s+-?\\d+(?:\\.\\d+)?){1,"+n+"}";
  const re = new RegExp("\\s*\\b"+key+"\\b"+argpat);
  line = line.replace(re,"");
  if(val!==null&&val!=="") line = line.trim()+" "+key+" "+val;
  return line.trim();
}
const setKey=setProp;
function editLine(idx,fn){ const L=setupLines(); if(idx<0||idx>=L.length)return; L[idx]=fn(L[idx]); commit(L); }
function deleteLine(idx){ const L=setupLines(); if(idx<0||idx>=L.length)return; L.splice(idx,1); commit(L); }
// world-level single-arg directive: set/replace a whole line like `liquid ...` or `hidelayer N`.
function setWorldLine(prefix,full){ const L=setupLines(); const i=L.findIndex(l=>new RegExp("^\\s*"+prefix+"\\b").test(l));
  if(full===null){ if(i>=0){L.splice(i,1);commit(L);} return; }
  if(i>=0)L[i]=full; else { let j=L.findIndex(l=>/^\s*(run|hold)\b/.test(l)); if(j<0)j=L.length; L.splice(j,0,full); } commit(L); }

/* ================= canvas interaction ================= */
const cv=$("cv");
function cellAt(e){ const r=cv.getBoundingClientRect();
  return [Math.floor((e.clientY-r.top)/(r.height/vid.height)), Math.floor((e.clientX-r.left)/(r.width/vid.width))]; }
function ownerAt(r,c){ return (setup&&setup.owners&&setup.owners[r]&&setup.owners[r][c])||null; }
// what's under the cursor on frame 0: an object body, or (within 1 cell) a source / shooter.
function pick(r,c){
  if(!setup) return null;
  const b=ownerAt(r,c); if(b&&b.srcLine>=0) return {kind:"body",body:b,srcLine:b.srcLine};
  const near=arr=>arr.find(s=>s.srcLine>=0 && Math.abs(s.r-r)<=1 && Math.abs(s.c-c)<=1);
  const src=near(setup.world.sources); if(src) return {kind:"source",body:src,srcLine:src.srcLine};
  const sh=near(setup.world.shooters); if(sh) return {kind:"shooter",body:sh,srcLine:sh.srcLine};
  return null;
}

cv.addEventListener("pointerdown",e=>{
  if(!vid)return; const [r,c]=cellAt(e); if(r<0||c<0||r>=vid.height||c>=vid.width)return;
  if(tool==="select"){ frameIdx=0; setPlaying(false);
    const hit=pick(r,c);
    if(hit){ selected=hit; drag={startR:r,startC:c,objR:hit.body.r,objC:hit.body.c}; cv.setPointerCapture(e.pointerId); renderInspector(); draw(); }
    else { selected=null; renderInspector(); draw(); }
  }
  else if(tool==="erase"){ frameIdx=0; const hit=pick(r,c); if(hit&&hit.srcLine>=0) deleteLine(hit.srcLine); }
  else if(tool==="paint"){ frameIdx=0; insertSetup(`spawn dot at ${r} ${c} color ${opt.color}`); }
  else if(tool==="stamp"){ frameIdx=0; let l=`spawn ${opt.shape} ${opt.args} at ${r} ${c} color ${opt.color}`;
    if(opt.vel.trim()&&opt.vel.trim()!=="0 0") l+=` vel ${opt.vel.trim()}`;
    if(+opt.grav) l+=` grav 1`; if(+opt.bounce) l+=` bounce ${opt.bounce}`; if(+opt.spin) l+=` spin ${opt.spin}`;
    if(opt.interior!=="") l+=` interior ${opt.interior}`; if(opt.fill==="outline") l+=` fill outline`;
    if(+opt.layer) l+=` layer ${opt.layer}`; if(+opt.magnet) l+=` magnet ${opt.magnet}`;
    insertSetup(l); }
  else if(tool==="hole"){ frameIdx=0; insertSetup(`hole ${opt.shape} ${opt.args} at ${r} ${c} id h${Date.now()%1000} color 5`); }
  else if(tool==="shooter"){ frameIdx=0; insertSetup(`shooter at ${r} ${c} dir ${opt.dir} every ${opt.every} beam ${opt.beam} color ${opt.color} speed ${opt.speed}`); }
  else if(tool==="source"){ frameIdx=0; insertSetup(`source at ${r} ${c} color ${opt.color} rate ${opt.rate}`); }
  else if(tool==="voronoi"){ frameIdx=0; let l=`voronoi ${opt.vcount}`; if(opt.borders!=="")l+=` borders ${opt.borders}`; if(+opt.drift)l+=` drift`; insertSetup(l); }
  else if(tool==="noise"){ frameIdx=0; applyNoise(); }
});
// random/Perlin generator: replace the single `noise` line with the configured one.
function applyNoise(){
  let l = opt.nmode==="perlin"
    ? `noise perlin scale ${opt.nscale||6} colors ${opt.ncolors.trim()}`
    : `noise uniform colors ${opt.ncolors.trim()} probs ${opt.nprobs.trim()}`;
  setWorldLine("noise", l);
}
cv.addEventListener("pointermove",e=>{
  if(!drag||tool!=="select"||!selected)return; const [r,c]=cellAt(e);
  const nr=drag.objR+(r-drag.startR), nc=drag.objC+(c-drag.startC);
  editLine(selected.srcLine,l=>setKey(l,"at",nr+" "+nc));
  reselect();
});
cv.addEventListener("pointerup",()=>{ drag=null; });

/* ================= inspector (per tool) ================= */
function sw(sel){ return G.ARC_PALETTE.map((h,i)=>`<div class="sw${i===sel?' on':''}" style="background:${h}" data-c="${i}"></div>`).join(""); }
function bindSwatches(el,onpick){ el.querySelectorAll(".sw").forEach(s=>s.onclick=()=>{ onpick(+s.dataset.c); [...el.children].forEach((c,i)=>c.classList.toggle("on",i===+s.dataset.c)); }); }
function f(label,html){ return `<div class="field"><label>${label}</label>${html}</div>`; }

function renderInspector(){
  const I=$("inspect"); let h="";
  // selection card — full property editor for the selected element (object / source / shooter)
  if(tool==="select"&&selected){ const b=selected.body;
    const actions=`<div class="row" style="margin-top:10px"><button id="dup">Duplicate</button><button id="copyb">Copy</button></div>
      <div class="row" style="margin-top:6px"><button id="cutb">Cut</button><button id="del" class="danger">Delete</button></div>
      <div class="note">Drag on canvas to move. ⌘C/⌘X/⌘V · ⌫ delete · ⌘Z undo.</div>`;
    if(selected.kind==="source"){
      h+=`<div class="card"><h3>Liquid source<span class="pill">L</span></h3>
        <div class="micro">liquid color</div><div class="swatches" id="selSw">${sw(b.color)}</div>
        ${f("rate (drop every K frames)",`<input id="s_rate" type="number" min="1" value="${b.rate}">`)}
        <div class="micro" style="margin-top:8px">global fluid feel</div>
        ${f("viscosity — "+(opt.viscosity<=0.2?"watery":opt.viscosity>=0.8?"thick":"medium")+" ("+opt.viscosity+")",`<input id="o_visc" type="range" min="0" max="1" step="0.1" value="${opt.viscosity}">`)}
        ${f("turbulence — "+(+opt.turbulence===0?"calm (no random motion)":opt.turbulence)+"",`<input id="o_turb" type="range" min="0" max="1" step="0.1" value="${opt.turbulence}">`)}
        ${f("flow (substeps / frame)",`<input id="o_flow" type="number" min="1" max="12" value="${opt.flow}">`)}
        ${actions}</div>`;
    } else if(selected.kind==="shooter"){
      h+=`<div class="card"><h3>Shooter<span class="pill">T</span></h3>
        ${f("direction",`<select id="s_dir">${["right","left","up","down"].map(d=>`<option ${d===b.dirName?"selected":""}>${d}</option>`).join("")}</select>`)}
        ${f("beam",`<select id="s_beam">${["bolt","ray","spread"].map(d=>`<option ${d===b.beam?"selected":""}>${d}</option>`).join("")}</select>`)}
        <div class="grid2">${f("every K frames",`<input id="s_every" type="number" min="1" value="${b.every}">`)}${f("speed",`<input id="s_speed" type="number" min="1" value="${b.speed}">`)}</div>
        <div class="micro">beam color</div><div class="swatches" id="selSw">${sw(b.color)}</div>
        ${actions}</div>`;
    } else {
      h+=`<div class="card"><h3>Object<span class="pill">${b.kind}</span></h3>
        <div class="micro">color</div><div class="swatches" id="selSw">${sw(b.color)}</div>
        <div class="grid2">${f("vel r c",`<input id="s_vel" value="${b.vr+' '+b.vc}">`)}${f("layer",`<input id="s_layer" type="number" value="${b.layer|0}">`)}</div>
        <div class="grid2">${f("bounce 0–1",`<input id="s_bounce" type="number" step="0.5" min="0" max="1" value="${b.bounce}">`)}${f("spin every K",`<input id="s_spin" type="number" min="0" value="${b.spin}">`)}</div>
        <div class="grid2">${f("interior (blank=none)",`<input id="s_interior" value="${b.interior==null?'':b.interior}">`)}${f("magnet ± (like charges)",`<input id="s_magnet" type="number" value="${b.magnet|0}">`)}</div>
        <div class="chk"><input type="checkbox" id="s_grav" ${b.gravity?'checked':''}><label for="s_grav">gravity on this object</label></div>
        <div class="seg" id="s_fill"><button data-v="solid" class="${b.fill==='solid'?'on':''}">solid</button><button data-v="outline" class="${b.fill==='outline'?'on':''}">outline</button></div>
        ${actions}</div>`;
    }
  }
  // tool card
  const t=tool;
  if(t==="stamp"||t==="paint"||t==="hole"){
    h+=`<div class="card"><h3>${t==="hole"?"Hole":t==="paint"?"Paint":"Stamp"}</h3>`;
    if(t!=="paint"){ h+=f("shape",`<select id="o_shape">${Object.keys(G.SHAPES).map(s=>`<option ${s===opt.shape?"selected":""}>${s}</option>`).join("")}</select>`);
      h+=f("args (e.g. 3  or  2 4)",`<input id="o_args" value="${opt.args}">`); }
    h+=`<div class="micro">color</div><div class="swatches" id="o_color">${sw(opt.color)}</div>`;
    if(t==="stamp"){ h+=`<div class="grid2">${f("vel r c",`<input id="o_vel" value="${opt.vel}">`)}${f("spin (every K)",`<input id="o_spin" type="number" value="${opt.spin}" min="0">`)}</div>`;
      h+=`<div class="grid2">${f("bounce 0–1",`<input id="o_bounce" type="number" step="0.5" min="0" max="1" value="${opt.bounce}">`)}${f("interior color",`<input id="o_interior" value="${opt.interior}">`)}</div>`;
      h+=`<div class="grid2">${f("magnet ± (like charges)",`<input id="o_magnet" type="number" value="${opt.magnet}">`)}${f("",``)}</div>`;
      h+=`<div class="chk"><input type="checkbox" id="o_grav" ${+opt.grav?"checked":""}><label for="o_grav">gravity on this object</label></div>`;
      h+=`<div class="seg" id="o_fill"><button data-v="solid" class="${opt.fill==="solid"?"on":""}">solid</button><button data-v="outline" class="${opt.fill==="outline"?"on":""}">outline</button></div>`; }
    h+=`</div>`;
  }
  else if(t==="shooter"){
    h+=`<div class="card"><h3>Shooter</h3>
      ${f("direction",`<select id="o_dir">${["right","left","up","down"].map(d=>`<option ${d===opt.dir?"selected":""}>${d}</option>`).join("")}</select>`)}
      ${f("beam",`<select id="o_beam">${["bolt","ray","spread"].map(d=>`<option ${d===opt.beam?"selected":""}>${d}</option>`).join("")}</select>`)}
      <div class="grid2">${f("every K frames",`<input id="o_every" type="number" min="1" value="${opt.every}">`)}${f("speed",`<input id="o_speed" type="number" min="1" value="${opt.speed}">`)}</div>
      <div class="micro">beam color</div><div class="swatches" id="o_color">${sw(opt.color)}</div></div>`;
  }
  else if(t==="source"){
    h+=`<div class="card"><h3>Liquid source</h3>
      ${f("rate (drop every K)",`<input id="o_rate" type="number" min="1" value="${opt.rate}">`)}
      <div class="micro">liquid color</div><div class="swatches" id="o_color">${sw(opt.color)}</div>
      <div class="note">Shows as a dotted <b>L</b> in the editor; gone when you Run.</div></div>`;
    h+=`<div class="card"><h3>Fluid physics</h3>
      ${f("viscosity — "+(opt.viscosity<=0.2?"watery":opt.viscosity>=0.8?"thick":"medium")+" ("+opt.viscosity+")",`<input id="o_visc" type="range" min="0" max="1" step="0.1" value="${opt.viscosity}">`)}
      ${f("turbulence — "+(+opt.turbulence===0?"calm (no random motion)":opt.turbulence)+"",`<input id="o_turb" type="range" min="0" max="1" step="0.1" value="${opt.turbulence}">`)}
      ${f("flow (substeps / frame = speed)",`<input id="o_flow" type="number" min="1" max="12" value="${opt.flow}">`)}
      <div class="note">Global <code>liquid</code> directive. turbulence 0 = perfectly calm. Add <code>gravity down 1</code>.</div></div>`;
  }
  else if(t==="voronoi"){
    h+=`<div class="card"><h3>Voronoi field</h3>
      ${f("regions",`<input id="o_vcount" type="number" min="2" value="${opt.vcount}">`)}
      ${f("border color (blank = filled regions)",`<input id="o_borders" value="${opt.borders}">`)}
      <div class="chk"><input type="checkbox" id="o_drift" ${+opt.drift?"checked":""}><label for="o_drift">drift (animate seeds)</label></div>
      <div class="note">A segmentation prior: regions by nearest seed. Borders mark region edges.</div></div>`;
  }
  else if(t==="noise"){
    h+=`<div class="card"><h3>Random / Perlin</h3>
      <div class="seg" id="o_nmode"><button data-v="uniform" class="${opt.nmode==='uniform'?'on':''}">uniform</button><button data-v="perlin" class="${opt.nmode==='perlin'?'on':''}">perlin</button></div>
      ${f("colors (space-separated)",`<input id="o_ncolors" value="${opt.ncolors}">`)}
      ${opt.nmode==='uniform'?f("probabilities (match colors)",`<input id="o_nprobs" value="${opt.nprobs}">`):f("scale (feature size)",`<input id="o_nscale" type="number" min="1" value="${opt.nscale}">`)}
      <button id="o_napply" class="run" style="width:100%;margin-top:8px">APPLY ▸ FILL GRID</button>
      <div class="note">Uniform = i.i.d. random per cell (probability each). Perlin = smooth bands. Set a <code>seed</code> for variety.</div></div>`;
  }
  else if(t==="select"&&!selected){ h+=`<div class="card"><h3>Select / Move</h3><div class="note">Click an object, liquid source (L) or shooter (T) on the first frame. Its full properties open here; drag to move, recolor, duplicate or delete.</div></div>`; }
  else if(t==="erase"){ h+=`<div class="card"><h3>Erase</h3><div class="note">Click any object on the first frame to remove it from the scene.</div></div>`; }

  // world card
  const W=setup?setup.world:null;
  h+=`<div class="card"><h3>World</h3>
    <div class="grid2">${f("width",`<input id="w_w" type="number" min="2" value="${W?W.w:16}">`)}${f("height",`<input id="w_h" type="number" min="2" value="${W?W.h:16}">`)}</div>
    ${f("walls",`<select id="w_walls">${["box","floor","none"].map(x=>`<option ${W&&W.walls===x?"selected":""}>${x}</option>`).join("")}</select>`)}
    <div class="micro">background</div><div class="swatches" id="w_bg">${sw(W?W.bg:0)}</div></div>`;

  // layers card
  if(W){ const layers=[...new Set(W.bodies.map(b=>b.layer|0))].sort((a,b)=>a-b); const hid=W.hiddenLayers||[];
    h+=`<div class="card"><h3>Layers</h3>`;
    if(!layers.length) h+=`<div class="note">No objects yet. Give objects a <b>layer</b> (higher = drawn on top).</div>`;
    else { h+=`<div class="micro" style="margin-bottom:6px">higher = on top · toggle to hide</div>`;
      h+=layers.slice().reverse().map(L=>`<div class="row" style="justify-content:space-between;align-items:center;margin:4px 0">
        <span style="font:11px var(--mono)">layer ${L} <span style="color:var(--faint)">· ${W.bodies.filter(b=>(b.layer|0)===L).length} obj</span></span>
        <button class="lyeye${hid.includes(L)?' danger':''}" data-l="${L}" style="flex:0 0 auto;min-width:64px">${hid.includes(L)?'hidden':'shown'}</button></div>`).join(""); }
    h+=`</div>`; }

  I.innerHTML=h;
  bindInspector();
}

function bindInspector(){
  const setOpt=(k,v)=>{opt[k]=v;};
  if($("o_shape"))$("o_shape").onchange=e=>setOpt("shape",e.target.value);
  if($("o_args"))$("o_args").oninput=e=>setOpt("args",e.target.value);
  if($("o_vel"))$("o_vel").oninput=e=>setOpt("vel",e.target.value);
  if($("o_spin"))$("o_spin").oninput=e=>setOpt("spin",e.target.value);
  if($("o_bounce"))$("o_bounce").oninput=e=>setOpt("bounce",e.target.value);
  if($("o_interior"))$("o_interior").oninput=e=>setOpt("interior",e.target.value);
  if($("o_grav"))$("o_grav").onchange=e=>setOpt("grav",e.target.checked?1:0);
  if($("o_dir"))$("o_dir").onchange=e=>setOpt("dir",e.target.value);
  if($("o_beam"))$("o_beam").onchange=e=>setOpt("beam",e.target.value);
  if($("o_every"))$("o_every").oninput=e=>setOpt("every",e.target.value);
  if($("o_speed"))$("o_speed").oninput=e=>setOpt("speed",e.target.value);
  if($("o_rate"))$("o_rate").oninput=e=>setOpt("rate",e.target.value);
  if($("o_vcount"))$("o_vcount").oninput=e=>setOpt("vcount",e.target.value);
  if($("o_borders"))$("o_borders").oninput=e=>setOpt("borders",e.target.value);
  if($("o_drift"))$("o_drift").onchange=e=>setOpt("drift",e.target.checked?1:0);
  if($("o_fill"))$("o_fill").querySelectorAll("button").forEach(b=>b.onclick=()=>{opt.fill=b.dataset.v;[...b.parentNode.children].forEach(x=>x.classList.toggle("on",x===b));});
  if($("o_color"))bindSwatches($("o_color"),c=>setOpt("color",c));
  // fluid physics (source tool) — write a global `liquid` directive
  const liqLine=()=>`liquid viscosity ${opt.viscosity} turbulence ${opt.turbulence} flow ${opt.flow}`;
  if($("o_visc"))$("o_visc").onchange=e=>{opt.viscosity=+e.target.value; setWorldLine("liquid",liqLine()); renderInspector();};
  if($("o_turb"))$("o_turb").onchange=e=>{opt.turbulence=+e.target.value; setWorldLine("liquid",liqLine()); renderInspector();};
  if($("o_flow"))$("o_flow").onchange=e=>{opt.flow=+e.target.value; setWorldLine("liquid",liqLine());};
  // noise tool
  if($("o_nmode"))$("o_nmode").querySelectorAll("button").forEach(b=>b.onclick=()=>{opt.nmode=b.dataset.v;renderInspector();});
  if($("o_ncolors"))$("o_ncolors").oninput=e=>setOpt("ncolors",e.target.value);
  if($("o_nprobs"))$("o_nprobs").oninput=e=>setOpt("nprobs",e.target.value);
  if($("o_nscale"))$("o_nscale").oninput=e=>setOpt("nscale",e.target.value);
  if($("o_napply"))$("o_napply").onclick=()=>{ frameIdx=0; applyNoise(); };
  // selected object — full property editor (writes to its DSL line)
  if($("selSw"))bindSwatches($("selSw"),c=>editSelected("color",c));
  // selected source / shooter fields
  if($("s_rate"))$("s_rate").onchange=e=>editSelected("rate",+e.target.value||1);
  if($("s_dir"))$("s_dir").onchange=e=>editSelected("dir",e.target.value);
  if($("s_beam"))$("s_beam").onchange=e=>editSelected("beam",e.target.value);
  if($("s_every"))$("s_every").onchange=e=>editSelected("every",+e.target.value||1);
  if($("s_speed"))$("s_speed").onchange=e=>editSelected("speed",+e.target.value||1);
  if($("s_vel"))$("s_vel").onchange=e=>editSelected("vel",(e.target.value.trim()||"0 0"));
  if($("s_layer"))$("s_layer").onchange=e=>editSelected("layer",(+e.target.value)||null);
  if($("s_bounce"))$("s_bounce").onchange=e=>editSelected("bounce",+e.target.value||null);
  if($("s_spin"))$("s_spin").onchange=e=>editSelected("spin",+e.target.value||null);
  if($("s_interior"))$("s_interior").onchange=e=>editSelected("interior",e.target.value.trim()===""?null:e.target.value.trim());
  if($("s_magnet"))$("s_magnet").onchange=e=>editSelected("magnet",(+e.target.value)||null);
  if($("o_magnet"))$("o_magnet").oninput=e=>{opt.magnet=e.target.value;};
  if($("s_grav"))$("s_grav").onchange=e=>editSelected("grav",e.target.checked?"1":null);
  if($("s_fill"))$("s_fill").querySelectorAll("button").forEach(b=>b.onclick=()=>editSelected("fill",b.dataset.v==="solid"?null:"outline"));
  if($("dup"))$("dup").onclick=duplicateSelected;
  if($("copyb"))$("copyb").onclick=()=>{ clip=setupLines()[selected.srcLine]; };
  if($("cutb"))$("cutb").onclick=()=>{ clip=setupLines()[selected.srcLine]; deleteLine(selected.srcLine); selected=null; renderInspector(); };
  if($("del"))$("del").onclick=()=>{ deleteLine(selected.srcLine); selected=null; renderInspector(); };
  // layers visibility
  $("inspect").querySelectorAll(".lyeye").forEach(b=>b.onclick=()=>toggleHide(+b.dataset.l));
  // world
  if($("w_w"))$("w_w").onchange=e=>editWorld("grid",e.target.value+" "+(setup.world.h));
  if($("w_h"))$("w_h").onchange=e=>editWorld("grid",(setup.world.w)+" "+e.target.value);
  if($("w_walls"))$("w_walls").onchange=e=>editWorld("walls",e.target.value);
  if($("w_bg"))bindSwatches($("w_bg"),c=>editWorld("bg",c));
}
function editWorld(cmd,val){ const L=setupLines(); const i=L.findIndex(l=>new RegExp("^\\s*"+cmd+"\\b").test(l));
  if(i>=0)L[i]=cmd+" "+val; else L.unshift(cmd+" "+val); commit(L); renderInspector(); }

// ---- selection editing / clipboard / layer visibility ----
function reselect(){ if(!selected)return; const arr= selected.kind==="source"?setup.world.sources : selected.kind==="shooter"?setup.world.shooters : setup.world.bodies;
  const e=arr.find(x=>x.srcLine===selected.srcLine); if(e)selected.body=e; else selected=null; }
function editSelected(key,val){ if(!selected)return; editLine(selected.srcLine,l=>setProp(l,key,val===null?null:String(val))); reselect(); renderInspector(); draw(); }
function duplicateSelected(){ if(!selected)return; const line=setupLines()[selected.srcLine];
  insertSetup(setProp(line,"at",(selected.body.r+1)+" "+(selected.body.c+1))); }
function copySelected(){ if(selected) clip=setupLines()[selected.srcLine]; }
function cutSelected(){ if(!selected)return; clip=setupLines()[selected.srcLine]; deleteLine(selected.srcLine); selected=null; renderInspector(); }
function pasteClip(){ if(!clip)return; let line=clip; const m=line.match(/\bat (-?\d+) (-?\d+)/); if(m)line=setProp(line,"at",(+m[1]+1)+" "+(+m[2]+1)); insertSetup(line); }
function toggleHide(L){ const lines=setupLines(); const idx=lines.findIndex(l=>new RegExp("^\\s*hidelayer\\s+"+L+"\\b").test(l));
  if(idx>=0) lines.splice(idx,1); else { let j=lines.findIndex(l=>/^\s*(run|hold)\b/.test(l)); if(j<0)j=lines.length; lines.splice(j,0,"hidelayer "+L); }
  commit(lines); renderInspector(); }

/* ================= export / save / load ================= */
const isTauri = !!(window.__TAURI__ && window.__TAURI__.core);
function flash(msg){ let t=$("toast"); if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.style.cssText="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--magenta);color:var(--ink);font:11px var(--mono);padding:8px 14px;border-radius:3px;z-index:60;box-shadow:var(--halo)";
  clearTimeout(t._h); t._h=setTimeout(()=>t.remove(),2400); }
function download(blob,name){ const a=$("dl"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
const enc=s=>new TextEncoder().encode(s);
const blobBytes=async b=>new Uint8Array(await b.arrayBuffer());
// in the desktop app: native Save dialog (Finder) + reveal. In a browser: download.
async function saveOut(name, bytes){
  if(isTauri){ try{ const p=await window.__TAURI__.core.invoke("export_file",{name, bytes:Array.from(bytes)});
    flash(p? "saved → "+p : "export cancelled"); return; }catch(err){ flash("export failed: "+err); return; } }
  download(new Blob([bytes]), name); flash("downloaded "+name);
}
const pname=()=>($("pname").value||"gridvid").replace(/\s+/g,"_");
function frameCanvas(fr,cp){ const cn=document.createElement("canvas"); cn.width=vid.width*cp; cn.height=vid.height*cp; const x=cn.getContext("2d");
  for(let r=0;r<vid.height;r++)for(let c=0;c<vid.width;c++){x.fillStyle=G.ARC_PALETTE[fr[r][c]]||"#000";x.fillRect(c*cp,r*cp,cp,cp);} return cn; }
$("exBtn").onclick=()=>$("exMenu").classList.toggle("open");
document.addEventListener("click",e=>{ if(!e.target.closest(".menu"))$("exMenu").classList.remove("open"); });
$("exMenu").onclick=async e=>{ const x=e.target.closest("button"); if(!x)return; const k=x.dataset.x; $("exMenu").classList.remove("open"); if(!vid)return;
  if(k==="json") saveOut(pname()+".json", enc(JSON.stringify(vid)));
  else if(k==="copy"){ navigator.clipboard&&navigator.clipboard.writeText(JSON.stringify(vid)); flash("JSON copied to clipboard"); }
  else if(k==="gif") saveOut(pname()+".gif", GIF.encodeGif({frames:vid.frames,palette:G.ARC_PALETTE,cell:14,delayMs:1000/Math.max(1,+$("fps").value)}));
  else if(k==="png") frameCanvas(vid.frames[frameIdx],14).toBlob(async b=>saveOut(pname()+"_f"+frameIdx+".png", await blobBytes(b)));
  else if(k==="strip"){ const cp=12,gap=2,fw=vid.width*cp; const cn=document.createElement("canvas"); cn.width=(fw+gap)*vid.frames.length-gap; cn.height=vid.height*cp;
    const x=cn.getContext("2d"); x.fillStyle="#000"; x.fillRect(0,0,cn.width,cn.height); vid.frames.forEach((fr,i)=>x.drawImage(frameCanvas(fr,cp),(fw+gap)*i,0)); cn.toBlob(async b=>saveOut(pname()+"_strip.png", await blobBytes(b))); }
  else if(k==="augment"){ const aug=G.augmentVid(vid,{n:+opt.augN,seed:vid.meta&&vid.meta.seed||1}); saveOut(pname()+"_aug"+aug.length+".json", enc(JSON.stringify({format:"2dgridvid-batch",count:aug.length,videos:aug}))); }
};
$("saveBtn").onclick=()=>saveOut(pname()+".gridvid.txt", enc($("script").value));
$("undoBtn").onclick=undo; $("redoBtn").onclick=redo; $("clearBtn").onclick=clearScene;
$("loadBtn").onclick=()=>{ const inp=document.createElement("input"); inp.type="file"; inp.accept=".txt,.json"; inp.onchange=()=>{ const file=inp.files[0]; const fr=new FileReader();
  fr.onload=()=>{ const txt=fr.result; if(file.name.endsWith(".json")){ try{ vid=JSON.parse(txt); if(vid.videos)vid=vid.videos[0]; frameIdx=0; $("timeline").max=vid.frames.length-1; fitCanvas(); draw(); play(); }catch(e){$("err").textContent="bad json";} } else { $("script").value=txt; rebuild(); play(); $("pname").value=file.name.replace(/\.gridvid\.txt$|\.txt$/,""); } }; fr.readAsText(file); }; inp.click(); };

/* ================= drawer + keys ================= */
$("drawerBtn").onclick=()=>$("drawer").classList.toggle("open");
$("dslHelp").onclick=()=>{ $("script").value=$("script").value.replace(/\n*# --- GRAMMAR[\s\S]*$/,"")+"\n\n# --- GRAMMAR ---\n"+G.GRAMMAR.split("\n").map(l=>"# "+l).join("\n"); };
const KEY={v:"select",b:"paint",s:"stamp",h:"hole",t:"shooter",l:"source",o:"voronoi",n:"noise",e:"erase"};
document.addEventListener("keydown",e=>{ if(/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName))return;
  const mod=e.metaKey||e.ctrlKey, k=e.key.toLowerCase();
  if(mod&&k==="z"){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if(mod&&k==="y"){ e.preventDefault(); redo(); return; }
  if(mod&&k==="c"){ e.preventDefault(); copySelected(); return; }
  if(mod&&k==="x"){ e.preventDefault(); cutSelected(); return; }
  if(mod&&k==="v"){ e.preventDefault(); pasteClip(); return; }
  if(mod) return;
  if(e.key===" "){e.preventDefault();setPlaying(!playing);}
  else if(KEY[k])setTool(KEY[k]);
  else if((e.key==="Backspace"||e.key==="Delete")&&selected){ deleteLine(selected.srcLine); selected=null; renderInspector(); }
  else if(e.key==="ArrowRight")$("fwd").onclick(); else if(e.key==="ArrowLeft")$("back").onclick();
});

/* ================= boot ================= */
$("script").value=localStorage.getItem("gridvid:script")||EXAMPLES["shape-sorter toy"];
$("examples").value="shape-sorter toy";
$("pname").value="shape-sorter-toy"; rebuild(); renderInspector(); play(); updateHint();
}catch(__e){document.body.insertAdjacentHTML("afterbegin",'<div style="position:fixed;z-index:99999;left:0;right:0;top:0;background:#3a0010;color:#ffd0e0;font:12px monospace;padding:10px;white-space:pre-wrap;border-bottom:2px solid #ff5fae">gridvid error (please report):\n'+(((__e&&__e.message)||__e)+"\n"+((__e&&__e.stack)||""))+'</div>');}
</script>
